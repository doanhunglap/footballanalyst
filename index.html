<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Analyst · World Cup 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Roboto+Mono:wght@400;600&display=swap');

:root {
  --bg:      #0e1117;
  --bg2:     #161b24;
  --bg3:     #1e2533;
  --border:  #2a3344;
  --text:    #d4dbe8;
  --muted:   #7a8899;
  --gold:    #f5c842;
  --green:   #2ecc71;
  --orange:  #e67e22;
  --red:     #e74c3c;
  --blue:    #3b82f6;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; font-size:14px; line-height:1.5; }

/* ── TOPBAR ── */
.topbar {
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:14px 24px; display:flex; align-items:center; gap:16px;
  position:sticky; top:0; z-index:100;
}
.topbar-logo { font-weight:800; font-size:1rem; color:#fff; letter-spacing:-0.3px; }
.topbar-logo span { color:var(--gold); }
.topbar-tag {
  font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
  padding:3px 10px; border-radius:20px; border:1px solid #f5c84244;
  background:#f5c84211; color:var(--gold);
}
.topbar-right { margin-left:auto; font-size:12px; color:var(--muted); }

/* ── LAYOUT ── */
.layout { display:flex; min-height:calc(100vh - 53px); }

/* ── SIDEBAR ── */
.sidebar {
  width:200px; flex-shrink:0;
  background:var(--bg2); border-right:1px solid var(--border);
  padding:16px 0; position:sticky; top:53px;
  height:calc(100vh - 53px); overflow-y:auto;
}
.sidebar-label {
  font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); padding:0 16px 10px;
}
.day-btn {
  display:block; width:100%; text-align:left;
  padding:10px 16px; border:none; background:none; cursor:pointer;
  color:var(--muted); font-family:'Inter',sans-serif; font-size:13px;
  border-left:2px solid transparent; transition:all 0.15s;
}
.day-btn:hover { background:#ffffff08; color:var(--text); }
.day-btn.active {
  background:#f5c84210; color:var(--gold);
  border-left-color:var(--gold); font-weight:600;
}
.day-btn .day-count {
  float:right; font-size:10px; background:#ffffff0d;
  padding:1px 6px; border-radius:10px; color:var(--muted);
}
.day-btn.active .day-count { background:#f5c84222; color:var(--gold); }

/* ── MAIN ── */
.main { flex:1; padding:24px; overflow-y:auto; }

.day-section { display:none; }
.day-section.active { display:block; }

.day-heading {
  font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); margin-bottom:16px; padding-bottom:8px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.day-heading .date-badge {
  background:var(--gold); color:#1a1200; font-size:10px; font-weight:800;
  padding:2px 10px; border-radius:20px; letter-spacing:1px;
}

/* ── MATCH CARD ── */
.matches-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
  gap:12px; margin-bottom:32px;
}
.match-card {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:12px; padding:16px;
  cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden;
}
.match-card::before {
  content:''; position:absolute; inset:0; opacity:0;
  background:linear-gradient(135deg, #f5c84208 0%, transparent 100%);
  transition:opacity 0.2s;
}
.match-card:hover { border-color:#3a4455; transform:translateY(-2px); box-shadow:0 4px 20px #00000044; }
.match-card:hover::before { opacity:1; }

.card-top {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:14px;
}
.card-group { font-size:10px; font-weight:700; letter-spacing:1px; color:var(--muted); }
.card-time { font-size:11px; color:var(--muted); font-family:'Roboto Mono',monospace; }

.card-teams {
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.card-team { flex:1; }
.card-team.right { text-align:right; }
.card-flag { font-size:1.6rem; display:block; margin-bottom:3px; }
.card-name { font-size:13px; font-weight:700; }
.card-fifa { font-size:10px; color:var(--muted); }

.card-vs {
  text-align:center; flex-shrink:0; min-width:52px;
}
.vs-label { font-size:10px; color:var(--muted); letter-spacing:2px; font-weight:600; }

.card-bottom {
  margin-top:12px; padding-top:10px; border-top:1px solid #ffffff08;
  display:flex; align-items:center; justify-content:space-between;
}
.card-venue { font-size:11px; color:var(--muted); }
.card-hint {
  font-size:10px; color:var(--muted); display:flex; align-items:center; gap:4px;
  opacity:0.6;
}

/* STATUS BADGE */
.status-badge {
  display:inline-block; font-size:9px; font-weight:800; letter-spacing:1.5px;
  text-transform:uppercase; padding:2px 8px; border-radius:4px;
}
.status-upcoming { background:#ffffff0d; color:var(--muted); border:1px solid var(--border); }
.status-live     { background:#e74c3c22; color:var(--red); border:1px solid #e74c3c44; animation:pulse 2s infinite; }
.status-ft       { background:#2ecc7122; color:var(--green); border:1px solid #2ecc7144; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* TOP PICK BADGE */
.top-pick {
  position:absolute; top:10px; right:10px;
  font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  padding:2px 8px; border-radius:4px;
  background:var(--gold); color:#1a1200;
}

/* ── MODAL ── */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:#000000cc; backdrop-filter:blur(4px);
  align-items:flex-end; justify-content:center;
}
.modal-overlay.open { display:flex; }

.modal {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:20px 20px 0 0;
  width:100%; max-width:860px;
  max-height:90vh; overflow-y:auto;
  padding:0 0 40px;
  animation:slideUp 0.3s ease-out;
}
@keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:translateY(0); opacity:1; } }

.modal-drag {
  width:40px; height:4px; background:#ffffff22; border-radius:2px;
  margin:12px auto 0;
}
.modal-header {
  padding:16px 24px 20px;
  border-bottom:1px solid var(--border);
  position:sticky; top:0; background:var(--bg2); z-index:10;
}
.modal-close {
  float:right; background:none; border:none; color:var(--muted);
  font-size:1.4rem; cursor:pointer; line-height:1; padding:0 4px;
}
.modal-close:hover { color:var(--text); }
.modal-match-title {
  font-size:1.1rem; font-weight:800; color:#fff;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}
.modal-meta { font-size:11px; color:var(--muted); margin-top:4px; }

.modal-body { padding:20px 24px 0; }

/* ── MODAL: TOP 3 ── */
.modal-section-title {
  font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); margin-bottom:12px; padding-bottom:8px;
  border-bottom:1px solid var(--border);
}

.top3-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
@media(max-width:520px){ .top3-row { grid-template-columns:1fr; } }

.p-card {
  background:var(--bg3); border:1px solid var(--border);
  border-radius:10px; padding:14px 12px 12px;
  text-align:center; position:relative;
}
.p-card.p1 { border-color:var(--gold); background:linear-gradient(160deg,#1e2533,#191d28); }
.p-rank {
  position:absolute; top:-9px; left:50%; transform:translateX(-50%);
  font-size:9px; font-weight:700; letter-spacing:1px;
  padding:2px 10px; border-radius:20px; white-space:nowrap;
}
.p1 .p-rank { background:var(--gold); color:#1a1200; }
.p2 .p-rank { background:#7a8899; color:#0e1117; }
.p3 .p-rank { background:#3a4455; color:var(--muted); }
.p-score {
  font-family:'Roboto Mono',monospace; font-size:2rem; font-weight:600;
  margin:12px 0 2px; line-height:1;
}
.p1 .p-score { color:var(--gold); }
.p2 .p-score { color:var(--text); }
.p3 .p-score { color:var(--muted); }
.p-sublabel { font-size:10px; color:var(--muted); margin-bottom:8px; }
.p-pct {
  font-size:13px; font-weight:700; padding:3px 10px;
  border-radius:20px; display:inline-block; margin-bottom:8px;
}
.p1 .p-pct { background:#f5c84222; color:var(--gold); border:1px solid #f5c84244; }
.p2 .p-pct { background:#ffffff0d; color:var(--text); border:1px solid var(--border); }
.p3 .p-pct { background:#ffffff08; color:var(--muted); border:1px solid var(--border); }
.p-bar-bg { height:3px; background:#ffffff0d; border-radius:2px; margin-bottom:10px; }
.p-bar { height:3px; border-radius:2px; }
.p1 .p-bar { background:var(--gold); }
.p2 .p-bar { background:#7a8899; }
.p3 .p-bar { background:#3a4455; }
.p-reasons { text-align:left; }
.p-reason { font-size:11px; color:var(--muted); display:flex; gap:5px; padding:2px 0; }
.p-reason .dot { color:var(--gold); flex-shrink:0; }
.p1 .p-reason { color:#a0aec0; }

/* ── MODAL: SUMMARY ── */
.summary-strip {
  display:flex; gap:0; background:var(--bg3); border:1px solid var(--border);
  border-radius:10px; overflow:hidden; margin-bottom:20px;
}
.sum-item { flex:1; text-align:center; padding:12px 8px; border-right:1px solid var(--border); }
.sum-item:last-child { border-right:none; }
.sum-num { font-size:1.3rem; font-weight:800; line-height:1; }
.sum-sub { font-size:10px; color:var(--muted); margin-top:2px; }

/* ── MODAL: STATS ── */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
@media(max-width:520px){ .stats-grid { grid-template-columns:1fr; } }

.stat-card { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:14px; }
.stat-card-title {
  font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--muted); margin-bottom:12px;
}
.stat-row2 { margin-bottom:10px; }
.stat-row2:last-child { margin-bottom:0; }
.stat-head2 { display:flex; justify-content:space-between; font-size:11px; margin-bottom:4px; }
.sh-l { font-weight:600; }
.sh-r { font-weight:600; }
.sh-m { color:var(--muted); }
.stat-bar-bg2 { height:5px; background:#ffffff0d; border-radius:3px; display:flex; overflow:hidden; }
.sbl { border-radius:3px 0 0 3px; }
.sbr { border-radius:0 3px 3px 0; }

.form-line { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
.form-line:last-child { margin-bottom:0; }
.fl-name { width:70px; font-size:11px; font-weight:600; }
.fdots { display:flex; gap:3px; }
.fd {
  width:20px; height:20px; border-radius:50%; display:flex;
  align-items:center; justify-content:center; font-size:8px; font-weight:700;
}
.fd.W { background:#2ecc7133; color:var(--green); border:1px solid #2ecc7166; }
.fd.D { background:#f5c84222; color:var(--gold);  border:1px solid #f5c84266; }
.fd.L { background:#e74c3c22; color:var(--red);   border:1px solid #e74c3c66; }

/* ── MODAL: RISK ── */
.risk-list { display:grid; gap:8px; margin-bottom:20px; }
.risk-item2 {
  background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; padding:12px 14px;
  display:flex; gap:10px;
}
.ri-icon { flex-shrink:0; font-size:1rem; margin-top:1px; }
.ri-title { font-size:12px; font-weight:600; margin-bottom:2px; }
.ri-desc { font-size:11px; color:var(--muted); line-height:1.5; }
.risk-tag {
  font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  padding:1px 6px; border-radius:3px; margin-left:6px; vertical-align:middle;
}
.rt-h { background:#e74c3c22; color:var(--red);    border:1px solid #e74c3c44; }
.rt-m { background:#e67e2222; color:var(--orange); border:1px solid #e67e2244; }
.rt-l { background:#2ecc7122; color:var(--green);  border:1px solid #2ecc7144; }

/* MOBILE */
@media(max-width:640px){
  .sidebar { display:none; }
  .main { padding:16px; }
  .topbar { padding:12px 16px; }
}
</style>
</head>

// ─────────────────────────────────────────
// BUILD UI
// ─────────────────────────────────────────
const dateLabels = {
  '2026-06-11': 'T5, 11/06',
  '2026-06-12': 'T6, 12/06',
  '2026-06-13': 'T7, 13/06',
  '2026-06-14': 'CN, 14/06',
  '2026-06-15': 'T2, 15/06',
  '2026-06-16': 'T3, 16/06',
};

const statusLabel = {
  upcoming: '<span class="status-badge status-upcoming">Sắp diễn ra</span>',
  live:     '<span class="status-badge status-live">⬤ Live</span>',
  ft:       '<span class="status-badge status-ft">FT</span>',
};

function groupByDate(matches){
  const g = {};
  matches.forEach(m => { (g[m.date] = g[m.date]||[]).push(m); });
  return g;
}

function buildTimeline(){
  const grouped = groupByDate(MATCHES);
  const nav = document.getElementById('day-nav');
  const main = document.getElementById('main-content');
  const dates = Object.keys(grouped).sort();

  dates.forEach((date, i) => {
    const ms = grouped[date];
    const label = dateLabels[date] || date;

    // sidebar btn
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (i===0?' active':'');
    btn.dataset.date = date;
    btn.innerHTML = `${label}<span class="day-count">${ms.length}</span>`;
    btn.onclick = () => switchDay(date);
    nav.appendChild(btn);

    // section
    const sec = document.createElement('div');
    sec.className = 'day-section' + (i===0?' active':'');
    sec.id = 'day-'+date;

    const hasLive = ms.some(m => m.status==='live');
    sec.innerHTML = `<div class="day-heading">
      <span class="date-badge">${label}</span>
      ${ms.length} trận đấu
      ${hasLive ? '<span class="status-badge status-live" style="margin-left:auto">⬤ Live</span>' : ''}
    </div>`;

    const grid = document.createElement('div');
    grid.className = 'matches-grid';
    ms.forEach(m => { grid.appendChild(buildCard(m)); });
    sec.appendChild(grid);
    main.appendChild(sec);
  });
}

function buildCard(m){
  const div = document.createElement('div');
  div.className = 'match-card';
  div.onclick = () => openModal(m.id);
  div.innerHTML = `
    ${m.topPick ? '<div class="top-pick">★ Phân tích đầy đủ</div>' : ''}
    <div class="card-top">
      <span class="card-group">Bảng ${m.group}</span>
      <span class="card-time">${m.time}</span>
    </div>
    <div class="card-teams">
      <div class="card-team">
        <span class="card-flag">${m.home.flag}</span>
        <div class="card-name">${m.home.code}</div>
        <div class="card-fifa">FIFA #${m.home.fifa}</div>
      </div>
      <div class="card-vs">
        ${statusLabel[m.status]}
      </div>
      <div class="card-team right">
        <span class="card-flag">${m.away.flag}</span>
        <div class="card-name">${m.away.code}</div>
        <div class="card-fifa">FIFA #${m.away.fifa}</div>
      </div>
    </div>
    <div class="card-bottom">
      <span class="card-venue">📍 ${m.venue.split(',')[0]}</span>
      <span class="card-hint">Xem phân tích →</span>
    </div>
  `;
  return div;
}

function switchDay(date){
  document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', b.dataset.date===date));
  document.querySelectorAll('.day-section').forEach(s => s.classList.toggle('active', s.id==='day-'+date));
}

// ─────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────
function openModal(id){
  const m = MATCHES.find(x => x.id===id);
  if(!m) return;
  const a = m.analysis;

  document.getElementById('modal-title').innerHTML =
    `${m.home.flag} ${m.home.name} <span style="color:var(--muted);font-weight:400">vs</span> ${m.away.flag} ${m.away.name}
     ${statusLabel[m.status]}`;
  document.getElementById('modal-meta').innerHTML =
    `Bảng ${m.group} · ${m.time} · ${m.venue}`;

  // build body
  let html = '';

  // top 3
  html += `<div class="modal-section-title">Dự đoán tỉ số — Top 3</div>
  <div class="top3-row">`;
  ['p1','p2','p3'].forEach((cls, i) => {
    const p = a.predictions[i];
    const rankLabel = ['★ Cao nhất','2 · Khả năng cao','3 · Có thể xảy ra'][i];
    html += `<div class="p-card ${cls}">
      <div class="p-rank">${rankLabel}</div>
      <div class="p-score">${p.score}</div>
      <div class="p-sublabel">${p.label}</div>
      <div class="p-pct">${p.pct}%</div>
      <div class="p-bar-bg"><div class="p-bar" style="width:${p.pct}%"></div></div>
      <div class="p-reasons">${p.reasons.map(r=>`<div class="p-reason"><span class="dot">▸</span>${r}</div>`).join('')}</div>
    </div>`;
  });
  html += `</div>`;

  // summary strip
  html += `<div class="summary-strip">
    <div class="sum-item"><div class="sum-num" style="color:var(--canada, #e8192c)">${a.winHome}%</div><div class="sum-sub">${m.home.code} thắng</div></div>
    <div class="sum-item"><div class="sum-num" style="color:var(--gold)">${a.draw}%</div><div class="sum-sub">Hòa</div></div>
    <div class="sum-item"><div class="sum-num" style="color:var(--blue)">${a.winAway}%</div><div class="sum-sub">${m.away.code} thắng</div></div>
    <div class="sum-item"><div class="sum-num" style="color:var(--text)">${a.avgGoals}</div><div class="sum-sub">TB bàn thắng</div></div>
    <div class="sum-item"><div class="sum-num" style="color:var(--green)">${a.over15}%</div><div class="sum-sub">Over 1.5</div></div>
  </div>`;

  // stats + form
  html += `<div class="stats-grid">
    <div class="stat-card">
      <div class="stat-card-title">Chỉ số so sánh</div>`;
  a.stats.forEach(s => {
    html += `<div class="stat-row2">
      <div class="stat-head2">
        <span class="sh-l" style="color:${s.lc}">${s.l}</span>
        <span class="sh-m">${s.name}</span>
        <span class="sh-r" style="color:${s.rc}">${s.r}</span>
      </div>
      <div class="stat-bar-bg2">
        <div class="sbl" style="width:${s.lw}%;background:${s.lc}88"></div>
        <div class="sbr" style="width:${s.rw}%;background:${s.rc}88"></div>
      </div>
    </div>`;
  });
  html += `</div>
    <div class="stat-card">
      <div class="stat-card-title">Phong độ gần đây</div>`;
  [['home', m.home], ['away', m.away]].forEach(([side, team]) => {
    html += `<div class="form-line">
      <span class="fl-name">${team.flag} ${team.code}</span>
      <div class="fdots">${a.form[side].map(r=>`<div class="fd ${r}">${r}</div>`).join('')}</div>
    </div>`;
  });
  html += `</div></div>`;

  // risks
  html += `<div class="modal-section-title">Phân tích rủi ro</div><div class="risk-list">`;
  a.risks.forEach(r => {
    html += `<div class="risk-item2">
      <div class="ri-icon">${r.icon}</div>
      <div>
        <div class="ri-title">${r.title} <span class="risk-tag ${r.tag}">${r.level}</span></div>
        <div class="ri-desc">${r.desc}</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e){
  if(e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModalDirect(); });

// ─────────────────────────────────────────
buildTimeline();
</script>
</body>
</html>
